{% extends 'base.html' %}
{% block title %}Password Reset Complete - Store{% endblock %}

{% block content %}
<div class="min-h-[65vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full animate-fade-up text-center">
        <div class="w-20 h-20 rounded-full mx-auto mb-6 flex items-center justify-center bg-emerald-100 text-emerald-600">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h2 class="text-3xl font-bold tracking-tight mb-4" style="color: var(--text-primary);">Password Reset!</h2>
        <p class="text-sm leading-relaxed mb-8" style="color: var(--text-secondary);">
            Your password has been set. You may go ahead and log in now.
        </p>

        <div class="mt-8 text-center pt-8" style="border-top: 1px solid var(--border);">
            <a href="{% url 'login' %}" class="btn-primary" style="display: inline-flex;">Sign In</a>
        </div>
    </div>
</div>
{% endblock %}
